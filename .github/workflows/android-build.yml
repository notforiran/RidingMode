name: Build RidingMode APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          sdkmanager --licenses >/dev/null || true

      - name: Install required Android SDK packages
        shell: bash
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Print build environment
        shell: bash
        run: |
          java -version
          gradle -v
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms" || true
          ls "$ANDROID_HOME/build-tools" || true

      - name: Build debug APK
        shell: bash
        run: gradle :app:assembleDebug --stacktrace --warning-mode all

      - name: Verify APK output
        shell: bash
        run: |
          test -f app/build/outputs/apk/debug/app-debug.apk
          sha256sum app/build/outputs/apk/debug/app-debug.apk > app/build/outputs/apk/debug/app-debug.apk.sha256
          ls -lh app/build/outputs/apk/debug/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RidingMode-V9-debug-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/app-debug.apk.sha256